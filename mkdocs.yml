site_name: gradwave manual
site_description: Differentiable plane-wave DFT in PyTorch
docs_dir: docs/manual
use_directory_urls: true

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - toc.follow
    - content.code.copy

nav:
  - Overview: index.md
  - Installation: installation.md
  - Tutorials:
      - Geometry optimization: geometry-optimization.md
      - Learning XC by AD: learning-xc.md
      - Symmetry reduction: symmetry.md
      - Basis-set error estimation: error-estimation.md
      - Differentiable Hubbard U: hubbard-u.md
      - Non-collinear magnetism and SOC: noncollinear-soc.md
  - Inputs and outputs: io.md
  - Reference: reference.md
  - API reference:
      - Overview: api/index.md
      - High-level API: api/highlevel.md
      - SCF engine: api/scf.md
      - Properties: api/properties.md
      - Exchange–correlation: api/xc.md
      - Pseudopotentials: api/pseudopotentials.md
  - Performance: performance.md
  - Wisdom: wisdom.md
  - Bibliography: bibliography.md

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          paths: [src]
          options:
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            show_source: false
            heading_level: 3
            members_order: source
            separate_signature: true
            show_signature_annotations: true
            signature_crossrefs: true
            merge_init_into_class: true
            docstring_section_style: list
            filters: ["!^_"]

markdown_extensions:
  - admonition
  - attr_list
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js
